# A server block defines how Nginx should handle incoming HTTP requests.
server {

    # Listen for HTTP requests on port 81.
    # Since the Docker container exposes port 81,
    # requests reaching the container will be handled here.
    listen 81;

    # Server name (hostname).
    # For local development, localhost is sufficient.
    # In production, this could be:
    # server_name mywebsite.com www.mywebsite.com;
    server_name localhost;

    # Root directory containing the website files.
    # During Docker build, this folder receives the React/Vite build output.
    #
    # Dockerfile:
    # COPY --from=build /app/dist /usr/share/nginx/html
    #
    # Therefore:
    # index.html
    # assets/
    # favicon.ico
    # etc.
    # are all located inside this directory.
    root /usr/share/nginx/html;

    # Default file to serve when a directory is requested.
    #
    # Example:
    # http://localhost/
    #
    # Nginx serves:
    # /usr/share/nginx/html/index.html
    index index.html;

    # Handle all incoming requests.
    location / {

        # try_files checks for resources in this order:
        #
        # 1. Look for the exact file.
        #    Example:
        #    /logo.png
        #
        # 2. Look for a directory.
        #
        # 3. If neither exists, serve index.html.
        #
        # This is REQUIRED for React Router / Vue Router / Angular Router.
        #
        # Example:
        #
        # User enters:
        # http://localhost/dashboard
        #
        # There is NO dashboard.html file.
        #
        # Instead of returning 404,
        # Nginx serves index.html.
        #
        # React Router then loads and displays the Dashboard page.
        try_files $uri $uri/ /index.html;
    }
}